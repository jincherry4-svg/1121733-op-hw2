name: Spotify API Data Fetch

# 設定觸發條件
on:
  schedule:
    - [cite_start]cron: '0 0 * * *'     # 每天台灣時間早上 8 點執行 (UTC 00:00) [cite: 5, 145-148]
  [cite_start]workflow_dispatch:        # 允許在 GitHub 介面手動點擊執行 [cite: 5, 152]

jobs:
  spotify-task:
    [cite_start]runs-on: ubuntu-latest  # 使用 GitHub 提供的 Ubuntu 虛擬機 [cite: 158, 161]

    steps:
      # 1. 下載儲存庫中的程式碼 [cite: 168-169]
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 設定 Python 環境 [cite: 172-179]
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 安裝必要的套件 (requests) [cite: 188-190]
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 執行你的 Python 腳本 [cite: 196-199]
      - name: Run Spotify Spider
        run: python main.py

      # 5. 輸出結果存檔 (Artifact) - 這步是為了下載產出的檔案供作業截圖 [cite: 210-212]
      - name: Upload Data Results
        uses: actions/upload-artifact@v3
        with:
          name: spotify-results
          path: |
            fujii_kaze_tracks.json
            fujii_kaze_tracks.csv
